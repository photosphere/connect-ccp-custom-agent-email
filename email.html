<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Amazon Connect Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/amazon-connect-streams@2.18.3/release/connect-streams.js"></script>
    <style>
      @keyframes pulse {
        0%, 100% { background-color: #fef3c7; }
        50% { background-color: #fde68a; }
      }
      .pulse-animation { animation: pulse 2s infinite; }
    </style>
  </head>

  <body class="bg-gray-50">
    <!-- Top Header Bar (与参考页面保持一致) -->
    <div
      class="h-14 bg-gradient-to-r from-blue-600 to-blue-700 border-b border-blue-800 flex items-center justify-between px-6"
    >
      <h1 class="text-xl font-bold text-white">Amazon Connect Email</h1>
      <div class="flex gap-2">
        <button
          class="px-3 py-1.5 text-sm bg-white/20 text-white rounded-lg hover:bg-white/30 transition"
          id="logContainer-btn"
          onclick="showLog()"
        >
          日志
        </button>
      </div>
    </div>

    <div class="flex" style="height: calc(100vh - 3.5rem)">
      <!-- CCP 容器（页面加载即初始化，内嵌显示在最左侧） -->
      <div
        id="container-div"
        class="border-r border-gray-200"
        style="width: 400px"
      ></div>

      <!-- 主区域：排队邮件列表 -->
      <div class="flex-1 flex flex-col overflow-hidden">
        <div
          class="p-4 border-b border-gray-200 bg-gray-50 flex items-center justify-between"
        >
          <h2 class="text-sm font-semibold text-gray-700">
            排队中的邮件
            <span
              id="emailCount"
              class="ml-2 px-2 py-0.5 text-xs bg-blue-100 text-blue-700 rounded-full"
              >0</span
            >
          </h2>
          <div class="flex items-center gap-2">
            <label class="flex items-center gap-1 text-xs text-gray-500">
              <input type="checkbox" id="autoRefresh" class="rounded" />
              自动刷新(10s)
            </label>
            <button
              onclick="loadEmails()"
              class="px-3 py-1.5 text-sm bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-medium transition"
            >
              刷新
            </button>
          </div>
        </div>

        <div id="emailListWrap" class="flex-1 overflow-y-auto p-4 min-h-0">
          <table class="w-full text-sm border-collapse">
            <thead>
              <tr class="text-left text-xs text-gray-500 uppercase tracking-wide">
                <th class="px-3 py-2 border-b border-gray-200">主题</th>
                <th class="px-3 py-2 border-b border-gray-200">渠道</th>
                <th class="px-3 py-2 border-b border-gray-200">队列</th>
                <th class="px-3 py-2 border-b border-gray-200">入队时间</th>
                <th class="px-3 py-2 border-b border-gray-200">等待时长</th>
                <th class="px-3 py-2 border-b border-gray-200">Contact ID</th>
                <th class="px-3 py-2 border-b border-gray-200">操作</th>
              </tr>
            </thead>
            <tbody id="emailList">
              <tr>
                <td colspan="7" class="px-3 py-6 text-center text-gray-400">
                  请先登录，然后点击“刷新”加载排队邮件。
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- 水平拖拽分割条（查看历史时显示，可拖动改变上下高度） -->
        <div
          id="historyResizer"
          class="hidden h-2 bg-gray-200 hover:bg-blue-400 cursor-row-resize flex-shrink-0 transition-colors"
          title="拖动调整高度"
        ></div>

        <!-- 邮件历史面板（显示在邮件列表底部） -->
        <div
          id="historyPanel"
          class="hidden flex-col border-t border-gray-200 bg-white flex-shrink-0"
          style="height: 300px"
        >
          <div
            class="px-4 py-2 border-b border-gray-200 bg-gray-50 flex items-center justify-between flex-shrink-0"
          >
            <h3 id="historyTitle" class="text-sm font-semibold text-gray-700">
              邮件历史
            </h3>
            <button
              onclick="closeHistory()"
              class="px-2 py-1 text-sm text-gray-500 hover:text-gray-800"
            >
              ✕
            </button>
          </div>
          <div id="historyBody" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        </div>

        <!-- 日志容器 -->
        <div
          id="logContainer"
          class="hidden border-t border-gray-200 p-3 bg-gray-50"
        >
          <div class="flex justify-between items-center mb-2">
            <span class="text-xs text-gray-500 font-medium">系统日志</span>
            <button
              class="px-2 py-1 text-xs bg-gray-200 hover:bg-gray-300 rounded transition"
              onclick="clearOutput()"
            >
              清除
            </button>
          </div>
          <textarea
            id="logDisplay"
            readonly
            class="w-full h-40 text-xs border border-gray-300 rounded p-2 resize-none font-mono bg-white"
          ></textarea>
        </div>
      </div>

    </div>

    <textarea id="message" style="display: none"></textarea>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
