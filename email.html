<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Amazon Connect Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/amazon-connect-streams@2.18.3/release/connect-streams.js"></script>
    <style>
      @keyframes pulse {
        0%, 100% { background-color: #fef3c7; }
        50% { background-color: #fde68a; }
      }
      .pulse-animation { animation: pulse 2s infinite; }
    </style>
  </head>

  <body class="bg-gray-50">
    <!-- Top Header Bar (与参考页面保持一致) -->
    <div
      class="h-14 bg-gradient-to-r from-blue-600 to-blue-700 border-b border-blue-800 flex items-center justify-between px-6"
    >
      <h1 class="text-xl font-bold text-white">Amazon Connect Email</h1>
      <div class="flex gap-2">
        <button
          class="px-3 py-1.5 text-sm bg-white/20 text-white rounded-lg hover:bg-white/30 transition"
          id="logContainer-btn"
          onclick="showLog()"
        >
          日志
        </button>
      </div>
    </div>

    <div class="flex" style="height: calc(100vh - 3.5rem)">
      <!-- CCP 容器（页面加载即初始化，内嵌显示在最左侧） -->
      <div
        id="container-div"
        class="border-r border-gray-200"
        style="width: 400px"
      ></div>

      <!-- 主区域：标签页（排队中的邮件 / 历史邮件） -->
      <div class="flex-1 flex flex-col overflow-hidden">
        <!-- 标签栏 -->
        <div
          class="flex items-end gap-1 px-4 pt-2 border-b border-gray-200 bg-white flex-shrink-0"
        >
          <button
            id="tabQueue"
            onclick="switchTab('queue')"
            class="px-4 py-2 text-sm font-medium rounded-t-lg border border-b-0 border-transparent -mb-px"
          >
            排队中的邮件
          </button>
          <button
            id="tabHistory"
            onclick="switchTab('history')"
            class="px-4 py-2 text-sm font-medium rounded-t-lg border border-b-0 border-transparent -mb-px"
          >
            历史邮件
          </button>
        </div>

        <!-- 视图：排队中的邮件 -->
        <div id="queueView" class="flex-1 flex flex-col overflow-hidden min-h-0">
        <div
          class="p-4 border-b border-gray-200 bg-gray-50 flex items-center justify-between"
        >
          <h2 class="text-sm font-semibold text-gray-700">
            排队中的邮件
            <span
              id="emailCount"
              class="ml-2 px-2 py-0.5 text-xs bg-blue-100 text-blue-700 rounded-full"
              >0</span
            >
          </h2>
          <div class="flex items-center gap-2">
            <label class="flex items-center gap-1 text-xs text-gray-500">
              <input type="checkbox" id="autoRefresh" class="rounded" />
              自动刷新(10s)
            </label>

            <!-- 队列多选下拉 -->
            <div id="queueFilter" class="relative">
              <button
                type="button"
                id="queueFilterBtn"
                class="px-3 py-1.5 text-sm bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 rounded-lg font-medium transition flex items-center gap-1"
              >
                <span id="queueFilterLabel">队列: 全部</span>
                <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
              </button>
              <div
                id="queueFilterMenu"
                class="hidden absolute right-0 mt-1 w-64 max-h-72 overflow-y-auto bg-white border border-gray-200 rounded-lg shadow-lg z-20 p-2"
              >
                <div class="flex items-center justify-between px-1 pb-2 mb-1 border-b border-gray-100">
                  <button
                    type="button"
                    id="queueSelectAll"
                    class="text-xs text-blue-600 hover:underline"
                  >
                    全选
                  </button>
                  <button
                    type="button"
                    id="queueClearAll"
                    class="text-xs text-gray-500 hover:underline"
                  >
                    清空
                  </button>
                </div>
                <div id="queueFilterList" class="space-y-1">
                  <div class="px-1 py-2 text-xs text-gray-400">加载中...</div>
                </div>
              </div>
            </div>

            <button
              onclick="loadEmails()"
              class="px-3 py-1.5 text-sm bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-medium transition"
            >
              刷新
            </button>
          </div>
        </div>

        <div id="emailListWrap" class="flex-1 overflow-auto p-4 min-h-0">
          <table class="min-w-full text-sm border-collapse whitespace-nowrap">
            <thead>
              <tr class="text-left text-xs text-gray-500 uppercase tracking-wide">
                <th class="px-3 py-2 border-b border-gray-200">Contact ID</th>
                <th class="px-3 py-2 border-b border-gray-200">主题</th>
                <th class="px-3 py-2 border-b border-gray-200">队列</th>
                <th class="px-3 py-2 border-b border-gray-200">入队时间</th>
                <th class="px-3 py-2 border-b border-gray-200">等待时长</th>
                <th class="px-3 py-2 border-b border-gray-200">操作</th>
              </tr>
            </thead>
            <tbody id="emailList">
              <tr>
                <td colspan="6" class="px-3 py-6 text-center text-gray-400">
                  请先登录，然后点击“刷新”加载排队邮件。
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        </div>
        <!-- /queueView -->

        <!-- 视图：历史邮件 -->
        <div id="historyEmailView" class="hidden flex-1 flex-col overflow-hidden min-h-0">
          <div
            class="p-4 border-b border-gray-200 bg-gray-50 flex items-center justify-between flex-wrap gap-2"
          >
            <h2 class="text-sm font-semibold text-gray-700">
              历史邮件
              <span
                id="historyEmailCount"
                class="ml-2 px-2 py-0.5 text-xs bg-blue-100 text-blue-700 rounded-full"
                >0</span
              >
            </h2>
            <div class="flex items-center gap-2 flex-wrap">
              <label class="flex items-center gap-1 text-xs text-gray-500">
                开始
                <input
                  type="datetime-local"
                  id="histStart"
                  class="px-2 py-1 text-xs border border-gray-300 rounded-lg"
                />
              </label>
              <label class="flex items-center gap-1 text-xs text-gray-500">
                结束
                <input
                  type="datetime-local"
                  id="histEnd"
                  class="px-2 py-1 text-xs border border-gray-300 rounded-lg"
                />
              </label>
              <label class="flex items-center gap-1 text-xs text-gray-500">
                每页
                <select
                  id="histPageSize"
                  class="px-2 py-1 text-xs border border-gray-300 rounded-lg bg-white"
                >
                  <option value="25">25</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
              </label>
              <button
                onclick="loadHistoryEmails(1)"
                class="px-3 py-1.5 text-sm bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-medium transition"
              >
                查询
              </button>
            </div>
          </div>

          <div class="flex-1 overflow-auto p-4 min-h-0">
            <table class="min-w-full text-sm border-collapse whitespace-nowrap">
              <thead>
                <tr class="text-left text-xs text-gray-500 uppercase tracking-wide">
                  <th class="px-3 py-2 border-b border-gray-200">Contact ID</th>
                  <th class="px-3 py-2 border-b border-gray-200">发起时间</th>
                  <th class="px-3 py-2 border-b border-gray-200">系统邮箱地址</th>
                  <th class="px-3 py-2 border-b border-gray-200">客户邮箱地址</th>
                  <th class="px-3 py-2 border-b border-gray-200">座席</th>
                  <th class="px-3 py-2 border-b border-gray-200">操作</th>
                </tr>
              </thead>
              <tbody id="historyEmailList">
                <tr>
                  <td colspan="6" class="px-3 py-6 text-center text-gray-400">
                    选择时间范围后点击“查询”加载历史邮件。
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- 分页控制条 -->
          <div
            class="px-4 py-2 border-t border-gray-200 bg-gray-50 flex items-center justify-between flex-shrink-0"
          >
            <span id="histPageInfo" class="text-xs text-gray-500">共 0 条</span>
            <div class="flex items-center gap-2">
              <button
                id="histPrevBtn"
                onclick="historyPrevPage()"
                class="px-3 py-1 text-xs bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 rounded-lg font-medium transition disabled:opacity-40 disabled:cursor-not-allowed"
              >
                上一页
              </button>
              <button
                id="histNextBtn"
                onclick="historyNextPage()"
                class="px-3 py-1 text-xs bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 rounded-lg font-medium transition disabled:opacity-40 disabled:cursor-not-allowed"
              >
                下一页
              </button>
            </div>
          </div>
        </div>
        <!-- /historyEmailView -->

        <!-- 水平拖拽分割条（查看历史时显示，可拖动改变上下高度） -->
        <div
          id="historyResizer"
          class="hidden h-2 bg-gray-200 hover:bg-blue-400 cursor-row-resize flex-shrink-0 transition-colors"
          title="拖动调整高度"
        ></div>

        <!-- 邮件历史面板（显示在邮件列表底部） -->
        <div
          id="historyPanel"
          class="hidden flex-col border-t border-gray-200 bg-white flex-shrink-0"
          style="height: 300px"
        >
          <div
            class="px-4 py-2 border-b border-gray-200 bg-gray-50 flex items-center justify-between flex-shrink-0"
          >
            <h3 id="historyTitle" class="text-sm font-semibold text-gray-700">
              邮件历史
            </h3>
            <button
              onclick="closeHistory()"
              class="px-2 py-1 text-sm text-gray-500 hover:text-gray-800"
            >
              ✕
            </button>
          </div>
          <div id="historyBody" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        </div>

        <!-- 日志容器 -->
        <div
          id="logContainer"
          class="hidden border-t border-gray-200 p-3 bg-gray-50"
        >
          <div class="flex justify-between items-center mb-2">
            <span class="text-xs text-gray-500 font-medium">系统日志</span>
            <button
              class="px-2 py-1 text-xs bg-gray-200 hover:bg-gray-300 rounded transition"
              onclick="clearOutput()"
            >
              清除
            </button>
          </div>
          <textarea
            id="logDisplay"
            readonly
            class="w-full h-40 text-xs border border-gray-300 rounded p-2 resize-none font-mono bg-white"
          ></textarea>
        </div>
      </div>

    </div>

    <textarea id="message" style="display: none"></textarea>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
